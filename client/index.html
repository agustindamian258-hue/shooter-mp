<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>BattleRoyale 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      touch-action: none;
      overscroll-behavior: none;
    }
    #canvas { display: block; width: 100%; height: 100%; }

    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0a0a0a, #1a0a00);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #loading h1 {
      color: #ff6b00;
      font-family: 'Arial Black', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 6px;
      text-shadow: 0 0 30px #ff6b00, 0 0 60px #ff3300;
      margin-bottom: 8px;
    }
    #loading p {
      color: #888;
      font-family: Arial, sans-serif;
      font-size: 0.8rem;
      margin-bottom: 40px;
      letter-spacing: 3px;
    }
    #loading-bar-bg {
      width: 240px; height: 4px;
      background: #222; border-radius: 2px;
    }
    #loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #ff6b00, #ffcc00);
      border-radius: 2px;
      transition: width 0.2s ease;
    }

    #menu {
      position: fixed; inset: 0;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a0800 100%);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 90;
    }
    #menu-logo {
      color: #ff6b00;
      font-family: 'Arial Black', sans-serif;
      font-size: 2.5rem;
      letter-spacing: 4px;
      text-shadow: 0 0 20px #ff6b00;
      margin-bottom: 4px;
    }
    #menu-sub {
      color: #ff9500;
      font-family: Arial, sans-serif;
      font-size: 0.75rem;
      letter-spacing: 4px;
      margin-bottom: 50px;
    }
    #name-input {
      background: rgba(255,255,255,0.05);
      border: 2px solid #ff6b00;
      color: #fff;
      font-size: 1rem;
      padding: 14px 20px;
      border-radius: 10px;
      text-align: center;
      width: 240px;
      margin-bottom: 16px;
      outline: none;
      letter-spacing: 2px;
    }
    #name-input::placeholder { color: #555; }
    #play-btn {
      background: linear-gradient(135deg, #ff6b00, #ff9500);
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 1rem;
      letter-spacing: 4px;
      padding: 16px 50px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 0 25px rgba(255,107,0,0.6);
      margin-bottom: 30px;
    }
    #menu-stats {
      color: #444;
      font-family: Arial, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 2px;
    }

    /* HUD */
    #hud {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 50;
      display: none;
    }

    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 18px; height: 18px;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: rgba(255,255,255,0.9);
    }
    #crosshair::before {
      width: 2px; height: 100%;
      left: 50%; transform: translateX(-50%);
    }
    #crosshair::after {
      width: 100%; height: 2px;
      top: 50%; transform: translateY(-50%);
    }

    #top-hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    #kills-display {
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 0.8rem;
      text-shadow: 0 1px 3px #000;
    }
    #players-display {
      color: #aaa;
      font-family: Arial, sans-serif;
      font-size: 0.7rem;
      text-shadow: 0 1px 3px #000;
      margin-top: 2px;
    }
    #ping-display {
      color: #00e676;
      font-family: Arial, sans-serif;
      font-size: 0.7rem;
      text-shadow: 0 1px 3px #000;
      text-align: right;
    }

    #kill-feed {
      position: absolute;
      top: 55px; right: 14px;
      display: flex; flex-direction: column; gap: 3px;
    }
    .kill-feed-item {
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 0.65rem;
      padding: 3px 8px;
      border-radius: 4px;
      border-left: 2px solid #ff6b00;
    }

    #bottom-hud {
      position: absolute;
      bottom: 210px; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 16px;
      pointer-events: none;
    }

    #health-container {
      display: flex; flex-direction: column; gap: 3px;
    }
    #health-bar-bg {
      width: 130px; height: 7px;
      background: rgba(0,0,0,0.5);
      border-radius: 4px; overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
    }
    #health-bar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #00e676, #69f0ae);
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s ease;
    }
    #health-text {
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 0.65rem;
      text-shadow: 0 1px 3px #000;
    }

    #ammo-display {
      text-align: right;
    }
    #ammo-current {
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 1.8rem;
      text-shadow: 0 2px 4px #000;
      line-height: 1;
    }
    #ammo-reserve {
      color: #aaa;
      font-family: Arial, sans-serif;
      font-size: 0.75rem;
      text-shadow: 0 1px 3px #000;
    }
    #weapon-name {
      color: #ff9500;
      font-family: 'Arial Black', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-shadow: 0 1px 3px #000;
    }

    /* Controles táctiles — layout vertical */
    #controls {
      position: fixed; inset: 0;
      z-index: 60; pointer-events: none;
    }

    #joystick-zone {
      position: absolute;
      bottom: 24px; left: 20px;
      width: 120px; height: 120px;
      pointer-events: all;
    }
    #joystick-base {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.18);
      position: relative;
    }
    #joystick-knob {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.22);
      border: 2px solid rgba(255,255,255,0.35);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    #look-zone {
      position: absolute;
      top: 0; right: 0;
      width: 55%; height: 75%;
      pointer-events: all;
    }

    #fire-btn {
      position: absolute;
      bottom: 28px; right: 24px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,60,60,0.85), rgba(180,0,0,0.7));
      border: 3px solid rgba(255,120,120,0.8);
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
      box-shadow: 0 0 20px rgba(255,50,50,0.5);
    }
    #fire-btn span {
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 1px;
    }

    #jump-btn {
      position: absolute;
      bottom: 130px; right: 120px;
      width: 54px; height: 54px;
      border-radius: 50%;
      background: rgba(80,130,255,0.65);
      border: 2px solid rgba(130,170,255,0.75);
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
    }
    #jump-btn span {
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 0.6rem;
    }

    #reload-btn {
      position: absolute;
      bottom: 130px; right: 30px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(220,160,0,0.65);
      border: 2px solid rgba(255,200,50,0.75);
      display: flex; align-items: center; justify-content: center;
      pointer-events: all;
    }
    #reload-btn span {
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 0.55rem;
    }

    #death-screen {
      position: fixed; inset: 0;
      background: rgba(120,0,0,0.75);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 80;
    }
    #death-screen h2 {
      color: #fff;
      font-family: 'Arial Black', sans-serif;
      font-size: 2rem;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }
    #death-screen p {
      color: #ffcccc;
      font-family: Arial, sans-serif;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="loading">
    <h1>BATTLE ROYALE</h1>
    <p>LOADING WORLD...</p>
    <div id="loading-bar-bg">
      <div id="loading-bar"></div>
    </div>
  </div>

  <div id="menu">
    <div id="menu-logo">BATTLE ROYALE</div>
    <div id="menu-sub">SURVIVE · KILL · WIN</div>
    <input id="name-input" type="text" placeholder="TU NOMBRE" maxlength="16"/>
    <button id="play-btn" onclick="window.game && window.game.startGame()">▶ JUGAR</button>
    <div id="menu-stats">MULTIJUGADOR ONLINE</div>
  </div>

  <div id="hud">
    <div id="crosshair"></div>
    <div id="top-hud">
      <div>
        <div id="kills-display">💀 <span id="kills-count">0</span> kills</div>
        <div id="players-display">👥 <span id="players-count">1</span> en línea</div>
      </div>
      <div id="ping-display"><span id="ping-value">--</span> ms</div>
    </div>
    <div id="kill-feed"></div>
    <div id="bottom-hud">
      <div id="health-container">
        <div id="health-bar-bg"><div id="health-bar"></div></div>
        <div id="health-text">100 HP</div>
      </div>
      <div id="ammo-display">
        <div id="ammo-current">30</div>
        <div id="ammo-reserve">/ 120</div>
        <div id="weapon-name">ASSAULT RIFLE</div>
      </div>
    </div>
  </div>

  <div id="controls">
    <div id="joystick-zone">
      <div id="joystick-base">
        <div id="joystick-knob"></div>
      </div>
    </div>
    <div id="look-zone"></div>
    <div id="fire-btn"><span>FUEGO</span></div>
    <div id="jump-btn"><span>SALTAR</span></div>
    <div id="reload-btn"><span>RECARGAR</span></div>
  </div>

  <div id="death-screen">
    <h2>💀 ELIMINADO</h2>
    <p>Reapareciendo...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script type="module" src="./src/main.js"></script>

</body>
  </html>
